services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      # Main config — settings.yml lives here
      - ./searxng:/etc/searxng

      # AI Summary plugin
      - ./ai_summary.py:/usr/local/searxng/searx/plugins/ai_summary.py:ro

      # AI Summary async JS — served as a static file
      - ./ai_summary.js:/usr/local/searxng/searx/static/themes/simple/js/ai_summary.js:ro

    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"